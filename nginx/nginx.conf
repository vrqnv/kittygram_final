server {
  listen 80;
  client_max_body_size 20M;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000;
  }

  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000;
  }

  location /media/ {
    alias /media/;
  }

  location ^~ /static/admin/ {
    alias /static/admin/;
  }

  location ^~ /static/rest_framework/ {
    alias /static/rest_framework/;
  }

  location / {
    root /static;
    try_files $uri $uri/ /index.html;
  }
}
